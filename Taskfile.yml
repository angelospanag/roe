version: "3"

vars:
  BINARY: app
  DIST: bin

tasks:
  setup:
    desc: 🛠️ Install prerequisites (Go, Task, golangci-lint, Docker, sqlc)
    cmds:
      - task: setup:{{OS}}

  setup:darwin:
    internal: true
    cmds:
      - brew install go@1.26 go-task golangci-lint sqlc
      - brew install --cask docker

  setup:linux:
    internal: true
    cmds:
      - brew install go@1.26 go-task golangci-lint sqlc
      - curl -fsSL https://get.docker.com | sh

  setup:windows:
    internal: true
    cmds:
      - winget install GoLang.Go --version 1.26
      - winget install GoTask.Task
      - winget install golangci-lint.golangci-lint --version 2.10.1
      - winget install Docker.DockerDesktop
      - go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

  run:
    desc: 🚀 Run without building a binary
    cmds:
      - go run ./cmd/api

  build:
    desc: 📦 Build for current platform
    cmds:
      - go build -o {{.DIST}}/{{.BINARY}} ./cmd/api

  build:all:
    desc: 📦 Build for all platforms
    deps:
      [
        build:linux-amd64,
        build:linux-arm64,
        build:darwin-amd64,
        build:darwin-arm64,
        build:windows-amd64,
      ]

  build:linux-amd64:
    desc: 🐧 Build for Linux amd64
    cmds:
      - GOOS=linux GOARCH=amd64 go build -o {{.DIST}}/{{.BINARY}}-linux-amd64 ./cmd/api

  build:linux-arm64:
    desc: 🐧 Build for Linux arm64
    cmds:
      - GOOS=linux GOARCH=arm64 go build -o {{.DIST}}/{{.BINARY}}-linux-arm64 ./cmd/api

  build:darwin-amd64:
    desc: 🍎 Build for macOS amd64
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -o {{.DIST}}/{{.BINARY}}-darwin-amd64 ./cmd/api

  build:darwin-arm64:
    desc: 🍎 Build for macOS arm64
    cmds:
      - GOOS=darwin GOARCH=arm64 go build -o {{.DIST}}/{{.BINARY}}-darwin-arm64 ./cmd/api

  build:windows-amd64:
    desc: 🪟 Build for Windows amd64
    cmds:
      - GOOS=windows GOARCH=amd64 go build -o {{.DIST}}/{{.BINARY}}-windows-amd64.exe ./cmd/api

  test:
    desc: 🧪 Run tests
    cmds:
      - go test ./...

  fmt:
    desc: ✨ Format code with golangci-lint
    cmds:
      - golangci-lint fmt

  lint:
    desc: 🔍 Run linters
    cmds:
      - golangci-lint run

  update:
    desc: 📥 Update and tidy dependencies
    cmds:
      - go get -u ./...
      - go mod tidy

  clean:
    desc: 🧹 Remove build artifacts
    cmds:
      - rm -rf {{.DIST}}
